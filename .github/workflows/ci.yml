name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**"]

# Anuluj nadmiarowe biegi dla tej samej gałęzi/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Aplikacja jest Windows-only — testujemy na Windows.
    # (Świadomie unikamy macOS — bilingowany 10x.)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync (dev)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Tests (pytest-qt, offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest

      - name: Audit dependencies (pip-audit)
        # Eksport locka do requirements i audyt. Wykluczamy projekt (--no-emit-project)
        # oraz gui-kit (--no-emit-package) — pip-audit nie audytuje zależności git.
        # Zakres = to, co instaluje `uv sync --extra dev` (spójnie z CI); extras
        # transcribe-hf/ct2 świadomie pomijamy (nightly torch, poza torem CI).
        run: |
          uv export --format requirements-txt --no-emit-project --no-emit-package chodzkos-gui-kit --extra dev > req-audit.txt
          uv run --with pip-audit pip-audit -r req-audit.txt
